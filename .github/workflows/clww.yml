name: OpenClaw Ubuntu SSH

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  openclaw:
    runs-on: ubuntu-24.04
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip jq tar git openssh-server

      - name: Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt install -y nodejs

      - name: Install SSH Server
        run: |
          echo 'runner:Egianda@1' | sudo chpasswd

          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || sudo apt install curl -y

          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
          sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg

          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg

          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
          sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null

          sudo apt update
          sudo apt install gh -y

      - name: Restore Session From Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.openclaw

          if gh release view session-backup >/dev/null 2>&1; then
            mkdir -p restore
            cd restore

            gh release download session-backup

            if [ -f session.tar.gz ]; then
              tar -xzf session.tar.gz -C ~/
              echo "Session restored"
            fi

            cd ..
          else
            echo "No backup release found"
          fi

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          npm install -g pm2

      - name: Start OpenClaw
        run: |
          pm2 start openclaw --name openclaw || true
          pm2 save

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Get Tailscale IP
        run: |
          echo "TAILSCALE_IP=$(tailscale ip -4)" >> $GITHUB_ENV

      - name: Send Telegram Status
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚀 OpenClaw Started

          SSH HOST : $TAILSCALE_IP
          USER     : runner
          PASSWORD : Egianda@1
          PORT     : 22"

          curl -X POST             "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"             -d chat_id="${CHAT_ID}"             -d text="${MESSAGE}"

      - name: Keep Runner Alive
        run: |
          sleep 19800
